<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuveration | Inovação Digital</title>
    <style>
        /* Reset básico e Fontes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; /* Azul escuro profundo */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contentor Principal */
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* Estilo do Logo */
        .logo {
            width: 150px; /* Tamanho ajustado para visualização, mas o source é 512x512 */
            height: auto;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #38bdf8;
        }

        /* Menu de Botões */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 18px 30px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        /* Efeitos de Hover (PC) */
        .btn:hover {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        /* Ajustes para PC (Ecrãs maiores) */
        @media (min-width: 768px) {
            .nav-links {
                flex-direction: row;
                justify-content: center;
                gap: 20px;
            }
            
            .btn {
                flex: 1;
                min-width: 160px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        /* Footer simples */
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="LOGO.png" alt="Nuveration Logo" class="logo">

        <h1>NUVERATION</h1>

        <div class="nav-links">
            <a href="https://sonation.nuveration.com" class="btn">Sonation</a>
            <a href="https://famorg.nuveration.com" class="btn">Famorg</a>
            <a href="https://smartscroll.nuveration.com" class="btn">SmartScroll</a>
        </div>
    </div>

    <footer>
        &copy; 2024 Nuveration. Todos os direitos reservados.
    </footer>

</body>
</html>
